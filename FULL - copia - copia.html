const DB = {
  getProducts: ()    => JSON.parse(localStorage.getItem('ppc_products') || 'null') || DEFAULT_PRODUCTS,

function notify(msg, type='ok') {
  const c = document.getElementById('notifs');
  const n = document.createElement('div');
  n.className = `notif ${type}`;
  n.textContent = msg;

function showView(v) {
  CV = v;
  ['dashboard','nueva','guardadas','productos','config'].forEach(name => {
    const el = document.getElementById('view-' + name);
    if (el) el.style.display = (name === v) ? 'block' : 'none';
  });
  document.querySelectorAll('[data-v]').forEach(el => el.classList.toggle('active', el.dataset.v === v));
  document.querySelectorAll('[data-mv]').forEach(el => el.style.color = el.dataset.mv === v ? '#D4871B' : '#6B6559');

  if (renders[v]) renders[v]();
  window.scrollTo(0,0);
}

// ================= CALCULATOR =================
function calculate(q) {
  const prods = DB.getProducts();
  const lbr   = DB.getLabor();

  const items = [];
  let totalMat = 0;

  // Agrupar m² por tipo de superficie y sumar unidades fijas
  const areaGroups = {};
  q.areas.forEach(a => {
    if (a.measureMode === 'm2') {
      const m2 = parseFloat(a.m2) || 0;
      if (m2 > 0) areaGroups[a.surfaceType] = (areaGroups[a.surfaceType] || 0) + m2;
    } else {
      const qty = parseInt(a.qty) || 0;
      const price = parseFloat(a.price) || 0;
      const cost = qty * price;
      // No agregar fixed item aquí si el área es Puerta/Ventana/Otro con litros manuales (se agrega después)
      if (cost > 0 && !(['Puerta','Ventana','Otro'].includes(a.surfaceType) && (parseFloat(a.manualLitres) || 0) > 0)) {
        totalMat += cost;
        items.push({ cat:'Fixed Item', desc: `${a.label} (${a.surfaceType})`, qty, unit:'units', unitCost:price, total:cost });
      }
    }
  });

  const totalM2 = Object.values(areaGroups).reduce((a,b)=>a+b,0);

  // Función auxiliar para calcular pintura con combinación óptima de envases
  const addPaintWithBestSize = (prod, litresNeeded, coats, cat, descPrefix, applyWaste = true) => {
    if (!prod || !prod.sizes || prod.sizes.length === 0) return;

    const litres = applyWaste ? litresNeeded * 1.18 : litresNeeded;
    const sizes = prod.sizes.slice().sort((a, b) => a.size - b.size);

    let bestCombo = null;
    let bestCost = Infinity;

    const maxQty = sizes.map(sz => Math.min(20, Math.ceil(litres / sz.size) + 2));

    const tryCombinations = (index, currentCombo, currentLitres, currentCost) => {
      if (currentCost >= bestCost) return;
      if (currentLitres >= litres) {
        if (currentCost < bestCost) {
          bestCost = currentCost;
          bestCombo = currentCombo.map(c => ({...c}));
        }
        return;
      }
      if (index >= sizes.length) return;
      const sz = sizes[index];
      for (let qty = 0; qty <= maxQty[index]; qty++) {
        const newLitres = currentLitres + qty * sz.size;
        const newCost = currentCost + qty * sz.price;
        if (newCost >= bestCost) break;
        const newCombo = currentCombo.concat([{ size: sz.size, price: sz.price, qty }]);
        tryCombinations(index + 1, newCombo, newLitres, newCost);
        if (newLitres >= litres) break;
      }
    };

    tryCombinations(0, [], 0, 0);

    if (bestCombo && bestCombo.length > 0) {
      const usedSizes = bestCombo.filter(c => c.qty > 0).sort((a, b) => b.size - a.size);
      const comboDesc = usedSizes.map(c => `${c.qty} × ${c.size}L`).join(' + ');
      const totalContainers = usedSizes.reduce((sum, c) => sum + c.qty, 0);

      totalMat += bestCost;
      const desc = `${prod.name} (${descPrefix}, ${coats} coat${coats>1?'s':''})`;

      const areaMatch = descPrefix.match(/([\d.]+)\s*m²/);
      const areaM2 = areaMatch ? areaMatch[1] : null;
      items.push({
        cat,
        desc,
        qty: totalContainers,
        unit: comboDesc,
        litres: litres.toFixed(1),
        unitCost: bestCost,
        total: bestCost,
        areaInfo: descPrefix,
        areaM2: areaM2
      });
    }
  };

    // Pintura por área individual (usa areaProducts)
  q.areas.forEach((a, i) => {
    // Asegurar ID único para cada área
    if (!a.id) a.id = 'a' + i + '_' + Date.now();
    
    const prodId = q.areaProducts && q.areaProducts[a.id];
    if (!prodId) return; // sin producto seleccionado
    
    const prod = prods.find(p => p.id === prodId);
    if (!prod) return;
    
    const sprayMultiplier = a.spray ? 1.30 : 1.0;
    
    // --- Caso 1: Litros manuales (Puerta/Ventana/Otro con valor > 0) ---
    const manualLitres = parseFloat(a.manualLitres) || 0;
    if (['Puerta','Ventana','Otro'].includes(a.surfaceType) && manualLitres > 0) {
      // litros manuales YA incluyen el spray si corresponde, solo añadir desperdicio
      const litresBase = manualLitres * sprayMultiplier;  // NO multiplicar por 1.18 aquí
            addPaintWithBestSize(prod, litresBase, q.coats, 'Paint', `${a.label || 'Área'} (${a.surfaceType}, ${manualLitres.toFixed(1)}L manual)`, false);
      
      // Agregar costo fijo si es unidad fija
      if (a.measureMode !== 'm2') {
        const qty = parseInt(a.qty) || 0;
        const price = parseFloat(a.price) || 0;
        const cost = qty * price;
        if (cost > 0) {
          totalMat += cost;
          items.push({ cat:'Fixed Item', desc: `${a.label} (${a.surfaceType})`, qty, unit:'units', unitCost:price, total:cost });
        }
      }
      return;
    }
    
    // --- Caso 2: Modo m² (cálculo normal) ---
    if (a.measureMode === 'm2') {
      const m2 = parseFloat(a.m2) || 0;
      if (m2 > 0) {
        addPaintWithBestSize(prod, (m2 / prod.coverage) * q.coats * sprayMultiplier, q.coats, 'Paint', `${a.label || 'Área'} (${a.surfaceType}, ${m2.toFixed(1)} m²)`);
      }
      return;
    }
    
    // --- Caso 3: Modo fixed sin litros manuales ---
    // (ya se manejó en el primer bucle de áreas, aquí no se agrega pintura)
  });

  // Primer global
  if (totalM2 > 0 && q.usePrimer && q.products.primer) {
    const prim = prods.find(p => p.id === q.products.primer);
    addPaintWithBestSize(prim, totalM2 / prim.coverage, 1, 'Primer/Sealer', '1 coat');
  }

  // Filler global
  if (totalM2 > 0 && q.useFiller && q.products.filler) {
    const fill = prods.find(p => p.id === q.products.filler);
    addPaintWithBestSize(fill, totalM2 / fill.coverage, 1, 'Filler/Putty', '');
  }

  // Consumibles automáticos (solo si hay superficie en m²)
  if (totalM2 > 0) {
    const cons = [
      { cat:'Consumables', desc:'Sandpaper / Abrasives',        qty:Math.max(2, Math.ceil(totalM2/15)),  unit:'sheets', unitCost:3.50  },
      { cat:'Consumables', desc:'Masking Tape',                  qty:Math.max(1, Math.ceil(totalM2/25)),  unit:'rolls',  unitCost:8.50  },
      { cat:'Consumables', desc:'Protective Plastic Sheeting',   qty:Math.max(1, Math.ceil(totalM2/40)),  unit:'rolls',  unitCost:14.00 },
      { cat:'Consumables', desc:'Paint Rollers & Frames',        qty:Math.max(2, Math.ceil(totalM2/80)+1),unit:'units',  unitCost:13.00 },
      { cat:'Consumables', desc:'Brushes & Applicators',         qty:parseInt(q.workers)||2,              unit:'sets',   unitCost:18.00 },
    ];
    cons.forEach(c => { c.total = c.qty * c.unitCost; totalMat += c.total; items.push(c); });
  }

  // Materiales extra
  (q.extraMaterials || []).forEach(em => {
    const cost = (parseFloat(em.qty)||0) * (parseFloat(em.unitCost)||0);
    if (cost > 0) {
      totalMat += cost;
      items.push({ cat:'Extra Material', desc: em.desc, qty:parseFloat(em.qty), unit:'units', unitCost:parseFloat(em.unitCost), total:cost });
    }
  });

  // Andamios
  if (q.scaffolding > 0) {
    totalMat += q.scaffolding;
    items.push({ cat:'Equipment', desc:'Scaffolding Rental', qty:1, unit:'rental', unitCost:q.scaffolding, total:q.scaffolding });
  }

  // Sprayer
  if (q.sprayer && q.sprayer.include && q.sprayer.cost > 0) {
    totalMat += q.sprayer.cost;
    items.push({ cat:'Service', desc:'Sprayer Application', qty:1, unit:'service', unitCost:q.sprayer.cost, total:q.sprayer.cost });
  }

  // Mano de obra
  const ratePerWorker = lbr.ratePerWorker || 30;
  const numWorkers = parseInt(q.workers) || 1;
  const hours = parseFloat(q.hours) || 0;
  const lbrCost = hours * ratePerWorker * numWorkers;

  const totalCost = totalMat + lbrCost;

  // Escenarios
  const scen = (label, marginPct, m2Mult) => {
    let sub;
    if (q.mode === 'm2') {
      sub = totalM2 * (parseFloat(q.m2Rate)||25) * (JOB_TYPES[q.jobType]?.mult||1) * m2Mult;
    } else {
      sub = totalCost * (1 + marginPct / 100);
    }
    const gst = sub * 0.15;
    return { label, materials:totalMat, labour:lbrCost, subtotal:sub, gst, total:sub+gst, margin:marginPct };
  };

  return {
    totalM2, items, totalMat, lbrCost, lbrRate: ratePerWorker, totalCost,
    scenarios: {
      base:        scen('Base',        q.margins.base,        1.00),
      recommended: scen('Recommended', q.margins.recommended, 1.15),
      premium:     scen('Premium',     q.margins.premium,     1.30),
    }
  };
}

// Helpers
function prodCard(p, selId, key) {
  // Mostrar información genérica: rango de tamaños y precio por litro
  const sizesStr = p.sizes ? p.sizes.map(sz => sz.size+'L').join(', ') : '';
  const pricePerLitre = p.sizes ? (p.sizes[0].price / p.sizes[0].size).toFixed(2) : '?';
  return `<div class="pcard ${selId===p.id?'sel':''}" onclick="QD.products['${key}']='${p.id}'; renderStep()">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
      <div>
        <div style="font-weight:600;font-size:13.5px;">${p.name}</div>
        <div style="font-size:12px;color:#8A8179;">
          <span class="bdg ${p.brand==='Resene'?'bdg-forest':'bdg-amber'}">${p.brand}</span>
          &nbsp;${PROD_TYPES[p.type]||p.type}
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-weight:700;color:#1A3C34;">${fmt(pricePerLitre)}/L</div>
        <div style="font-size:11px;color:#8A8179;">Envases: ${sizesStr}</div>
      </div>
    </div>
    <div style="font-size:11.5px;color:#8A8179;margin-top:6px;">Rendimiento: ${p.coverage} m²/L</div>
  </div>`;
}
function addArea(){ QD.areas.push({ label:'Superficie', m2:'', surfaceType:'Pared', measureMode:'m2', qty:1, price:0, spray:false }); renderStep(); }
function remArea(i){ QD.areas.splice(i,1); renderStep(); }
function updTot(){
  const total = QD.areas.reduce((s,a)=>s+(a.measureMode==='m2'?(parseFloat(a.m2)||0):0),0);
  const el = document.getElementById('tot-m2'); if(el) el.textContent = `Total área m²: ${total.toFixed(1)} m²`;
}
function addExtraMaterial(){ if(!QD.extraMaterials) QD.extraMaterials=[]; QD.extraMaterials.push({ desc:'', qty:1, unitCost:0 }); renderStep(); }
function removeExtraMat(i){ QD.extraMaterials.splice(i,1); renderStep(); }
function addProdFromDB(){
  const prods = DB.getProducts();
  const html = prods.map(p => `<option value="${p.id}">${p.name} (${p.brand})</option>`).join('');
  document.getElementById('modal-box').innerHTML = `<div class="card-header"><h2 class="ff-display">Seleccionar producto</h2><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>

    <div style="margin-top:14px;"><label class="lbl">Cantidad</label><input id="pm-qty" class="inp" type="number" value="1" min="1"><label class="lbl" style="margin-top:10px;">Precio unitario (NZD)</label><input id="pm-cost" class="inp" type="number" value="" placeholder="Auto"></div>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end;"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="addProdFromDBConfirm()">Agregar</button></div></div>`;
  document.getElementById('modal-bg').style.display='block'; document.getElementById('modal-wrap').style.display='flex';

function addProdFromDBConfirm(){
  const pid = document.getElementById('pm-select').value;
  const qty = parseFloat(document.getElementById('pm-qty').value)||1;
  const costInput = document.getElementById('pm-cost').value;
  const prod = DB.getProducts().find(p=>p.id===pid);
  if(!prod) return;
  // Si el usuario no puso precio manual, usar el precio del primer envase
  const unitCost = costInput ? parseFloat(costInput) : (prod.sizes && prod.sizes.length > 0 ? prod.sizes[0].price : 0);
  if(!QD.extraMaterials) QD.extraMaterials=[];
  QD.extraMaterials.push({ desc:`${prod.name} (${prod.brand})`, qty, unitCost });
  closeModal(); renderStep();
}

function saveS2(){ QD.notes=document.getElementById('qnotes')?.value||''; }
function updLbr(){
  const lbr=DB.getLabor(); const rate=lbr.ratePerWorker||40;
  const w=parseInt(document.getElementById('workers')?.value)||2;
  const h=parseFloat(document.getElementById('hrs')?.value)||0;
  const el=document.getElementById('lbr-prev'); if(el) el.textContent=fmt(h*rate*w)+' en mano de obra';

function computeResult(){
  const hEl=document.getElementById('hrs'), sEl=document.getElementById('scaff'), wEl=document.getElementById('workers');

  if(sEl) QD.scaffolding=parseFloat(sEl.value)||0;
  if(wEl) QD.workers=parseInt(wEl.value)||2;
  QR=calculate(QD); QS=4; renderNueva();
}

// ---- Productos ----
function renderProductos() {
  const all=DB.getProducts(); const shown=PFILTER==='all'?all:all.filter(p=>p.type===PFILTER);
  document.getElementById('view-productos').innerHTML = `
  <div class="fadein">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;">
      <div><h1 class="ff-display" style="font-size:30px;font-weight:700;color:#1A3C34;">Base de Datos de Productos</h1></div>
      <div style="display:flex;gap:10px;"><button class="btn btn-outline btn-sm" onclick="resetProds()">↺ Restablecer</button><button class="btn btn-amber" onclick="openProdModal(null)">+ Nuevo</button></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">${['all',...Object.keys(PROD_TYPES)].map(t => `<button onclick="PFILTER='${t}'; renderProductos()" class="btn btn-sm ${PFILTER===t?'btn-primary':'btn-outline'}">${t==='all'?'Todos':PROD_TYPES[t]}</button>`).join('')}</div>
    <div class="card"><div style="overflow-x:auto;"><table class="tbl"><thead><tr><th>Nombre</th><th>Marca</th><th>Tipo</th><th>Envase</th><th>$/Envase</th><th>$/Litro</th><th>Rendimiento</th><th>Acciones</th></tr></thead>
      <tbody>${shown.map(p => `<tr><td style="font-weight:600;">${p.name}</td><td><span class="bdg ${p.brand==='Resene'?'bdg-forest':'bdg-amber'}">${p.brand}</span></td><td>${PROD_TYPES[p.type]||p.type}</td><td>${p.containerSize}L</td><td>${fmt(p.pricePerContainer)}</td><td>${fmt(p.pricePerLitre)}</td><td>${p.coverage} m²/L</td><td><button class="btn btn-outline btn-sm" onclick="openProdModal('${p.id}')">Editar</button><button class="btn btn-danger btn-sm" onclick="delProd('${p.id}')">✕</button></td></tr>`).join('')}</tbody></table></div></div></div>`;
}
function openProdModal(pid){
  const prods=DB.getProducts(); const p=pid?prods.find(x=>x.id===pid):null;
  document.getElementById('modal-box').innerHTML = `<div class="card-header"><h2 class="ff-display">${p?'Editar':'Nuevo'} Producto</h2><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
  <div class="card-body"><div class="g2" style="gap:16px;">
    <div style="grid-column:1/-1;"><label class="lbl">Nombre *</label><input id="pm-name" class="inp" value="${p?.name||''}"></div>
    <div><label class="lbl">Marca *</label><select id="pm-brand" class="inp"><option ${p?.brand==='Resene'?'selected':''}>Resene</option><option ${p?.brand==='Dulux'?'selected':''}>Dulux</option><option>Otra</option></select></div>
    <div><label class="lbl">Tipo *</label><select id="pm-type" class="inp">${Object.entries(PROD_TYPES).map(([k,v])=>`<option value="${k}" ${p?.type===k?'selected':''}>${v}</option>`).join('')}</select></div>
    <div><label class="lbl">Envase (L)</label><input id="pm-cont" class="inp" type="number" value="${p?.containerSize||4}" step="0.5"></div>
    <div><label class="lbl">Precio/envase *</label><input id="pm-pricec" class="inp" type="number" value="${p?.pricePerContainer||''}" step="0.5"></div>
    <div><label class="lbl">Precio/litro</label><input id="pm-pricel" class="inp" type="number" value="${p?.pricePerLitre||''}" step="0.5"></div>
    <div><label class="lbl">Rendimiento (m²/L) *</label><input id="pm-cov" class="inp" type="number" value="${p?.coverage||12}" step="0.5"></div></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveProd('${pid||''}')">Guardar</button></div></div>`;
  document.getElementById('modal-bg').style.display='block'; document.getElementById('modal-wrap').style.display='flex';
}
function closeModal(){ document.getElementById('modal-bg').style.display='none'; document.getElementById('modal-wrap').style.display='none'; }
function saveProd(eid){
  const name=document.getElementById('pm-name').value.trim(), brand=document.getElementById('pm-brand').value, type=document.getElementById('pm-type').value;
  const cs=parseFloat(document.getElementById('pm-cont').value)||4, pc=parseFloat(document.getElementById('pm-pricec').value)||0;
  const pl=parseFloat(document.getElementById('pm-pricel').value)||+(pc/cs).toFixed(2), cov=parseFloat(document.getElementById('pm-cov').value)||12;
  if(!name){ alert('Nombre obligatorio'); return; }
  const prods=DB.getProducts(); const prod={id:eid||gid(),name,brand,type,containerSize:cs,pricePerContainer:pc,pricePerLitre:pl,coverage:cov};
  if(eid){ const i=prods.findIndex(p=>p.id===eid); if(i>=0) prods[i]=prod; } else prods.push(prod);
  DB.saveProducts(prods); closeModal(); notify('✓ Producto guardado'); renderProductos();
}
function delProd(id){ if(!confirm('¿Eliminar producto?')) return; DB.saveProducts(DB.getProducts().filter(p=>p.id!==id)); notify('Producto eliminado','err'); renderProductos(); }
function resetProds(){ if(!confirm('¿Restaurar productos por defecto?')) return; DB.saveProducts(DEFAULT_PRODUCTS); notify('✓ Restaurados'); renderProductos(); }

// ---- PDF Generation (con nota de plantas y andamios) ----
function generatePDF() {
  if (!QD || !QR) { notify('No hay datos para el PDF','err'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const co = DB.getCompany();
  const r  = QR;
  const { base:B, recommended:RC, premium:PR } = r.scenarios;
  const qn = qNum(QD.id || gid());
  const dt = todayStr();

  const C = {
    forest: [26,60,52], amber: [212,135,27], cream: [248,246,241], lGray: [240,237,231],
    mGray: [200,195,188], dark: [28,28,28], mid: [107,101,89], white: [255,255,255],
    lGreen: [220,233,229], lAmber: [253,245,232],
  };

  const W=210, H=297, M=18; let y=0;
  const fill=(x,fy,w,h,col)=>{ doc.setFillColor(...col); doc.rect(x,fy,w,h,'F'); };
  const line=(x1,y1,x2,y2,col,lw=0.3)=>{ doc.setDrawColor(...col); doc.setLineWidth(lw); doc.line(x1,y1,x2,y2); };
  const text=(t,x,ty,opts)=>doc.text(String(t),x,ty,opts||{});
  const sf=(style,size,col)=>{ doc.setFont('helvetica',style); doc.setFontSize(size); if(col) doc.setTextColor(...col); };

  // Header
  fill(0,0,W,52,C.forest);
  let headerTextX = M;
  if (co.logo) { try { const fmt2 = co.logo.split(';')[0].split('/')[1].toUpperCase().replace('SVG+XML','PNG'); doc.addImage(co.logo, fmt2, M, 8, 30, 30); headerTextX = M+36; } catch(e) {} }
  sf('bold',18,C.white); text(co.name, headerTextX, 20);
  sf('normal',8.5,[128,181,168]); if(co.address) text(co.address, headerTextX,28);
  const contactLine = [co.phone,co.email].filter(Boolean).join('  |  ');
  if(contactLine) text(contactLine, headerTextX,35);
  if(co.gst) text(`GST No: ${co.gst}`, headerTextX,42);
  sf('bold',16,C.amber); text('PAINTING QUOTATION', W-M, 18, {align:'right'});
  sf('bold',9,C.white); text(`Quote No: ${qn}`, W-M, 27, {align:'right'});
  sf('normal',8.5,[128,181,168]); text(`Date: ${dt}`, W-M, 34, {align:'right'}); text('Valid for 30 days', W-M, 41, {align:'right'});
  y=58;

  const bW = (W - M*2 - 6)/2;
  fill(M, y, bW, 44, C.cream); fill(M+bW+6, y, bW, 44, C.lGreen);
  sf('bold',7.5,C.mid); text('BILL TO / CLIENT', M+4, y+8);
  sf('bold',10.5,C.dark); text(QD.client.name||'Client Name', M+4, y+16);
  sf('normal',8.5,C.mid); if(QD.client.address) text(QD.client.address, M+4, y+23);
  if(QD.client.phone) text(`Tel: ${QD.client.phone}`, M+4, y+30);
  if(QD.client.email) text(QD.client.email, M+4, y+37);
  const bx = M+bW+10;
  sf('bold',7.5,C.mid); text('PROJECT DETAILS', bx, y+8);
  sf('bold',10.5,C.dark); text(JOB_TYPES[QD.jobType]?.en||QD.jobType, bx, y+16);
  sf('normal',8.5,C.mid); text(`Total Area: ${r.totalM2.toFixed(1)} m²`, bx, y+23);
  text(`Coats: ${QD.coats}  |  Workers: ${QD.workers}  |  Hours: ${QD.hours}h`, bx, y+30);
  text(`Mode: ${QD.mode==='m2'?'Per m²':'Actual Cost'}`, bx, y+37);
  y+=50;

  // ========== TABLA DE ITEMS VISIBLES (SOLO EXTRAS) ==========
  // Filtramos: Fixed Item, Filler/Putty, Equipment, Service, Extra Material
  const visibleItems = r.items.filter(it => 
    ['Fixed Item', 'Filler/Putty', 'Equipment', 'Service', 'Extra Material'].includes(it.cat)
  );
  
  if (visibleItems.length > 0) {
    fill(M, y, W-M*2, 8.5, C.forest); sf('bold',9,C.white); text('ADDITIONAL COSTS & SERVICES', M+4, y+6); y+=12;
    fill(M, y, W-M*2, 7, C.lGray); sf('bold',7.5,C.mid);
    const cX=[M+2, M+34, M+108, M+138, M+162];
    text('CAT.', cX[0], y+5); text('DESCRIPTION', cX[1], y+5); text('QTY', cX[2], y+5); text('UNIT COST', cX[3], y+5); text('TOTAL', cX[4], y+5); y+=9;

    visibleItems.forEach((it,idx)=>{
      if(y>248){ doc.addPage(); y=18; fill(M,y,W-M*2,7,C.lGray); sf('bold',7.5,C.mid); text('CAT.',cX[0],y+5); text('DESCRIPTION',cX[1],y+5); text('QTY',cX[2],y+5); text('UNIT COST',cX[3],y+5); text('TOTAL',cX[4],y+5); y+=9; }
      if(idx%2===0) fill(M, y-1, W-M*2, 9, [252,251,249]);
      sf('normal',7.5,C.mid); text(it.cat, cX[0], y+5);
      sf('normal',8,C.dark); text(it.desc, cX[1], y+5);
      sf('normal',8,C.dark); text(`${it.qty} ${it.unit}`, cX[2], y+5);
      sf('normal',8,C.dark); text('$'+fmtN(it.unitCost), cX[3], y+5);
      sf('bold',8,C.dark); text('$'+fmtN(it.total), cX[4], y+5);
      line(M, y+7, W-M, y+7, C.lGray, 0.2); y+=9;
    });
    y+=6;
  } else {
    // Si no hay extras, mostramos un mensaje opcional
    fill(M, y, W-M*2, 8.5, C.forest); sf('bold',9,C.white); text('ADDITIONAL COSTS', M+4, y+6); y+=12;
    fill(M, y, W-M*2, 10, C.lGray); sf('normal',8,C.mid); text('No additional costs or services included.', M+4, y+6.5);
    y+=14;
  }
  y+=6;

  // ========== PRICING OPTIONS (SIN MATERIALS, LABOUR, MARGIN) ==========
  if (y > 210) { doc.addPage(); y = 18; }
  fill(M, y, W-M*2, 8.5, C.forest);
  sf('bold', 9, C.white); text('PRICING OPTIONS — Choose the package that suits you best', M+4, y+6);
  y += 12;

  const scope = DB.getScope();
  const scenW = (W - M*2 - 8) / 3;
  const scenDefs = [
    { s:B,  label:'BASE',          bg:C.lGray,  hdr:C.forest, note:'Entry level pricing',      desc: scope.basic },
    { s:RC, label:'RECOMMENDED *', bg:C.lAmber, hdr:C.amber,  note:'Best value — most popular', desc: scope.recommended },
    { s:PR, label:'PREMIUM',       bg:C.lGreen, hdr:C.forest, note:'Premium quality finish',    desc: scope.premium },
  ];

  // Calcular altura necesaria para cada columna (ahora con menos filas)
  const columnHeights = scenDefs.map(sd => {
    let h = 11; // header
    h += 13;    // espacio inicial
    // Solo 2 filas: Subtotal + GST (ya no hay Materials, Labour, Margin)
    h += 2*7 + 4 + 7 + 7; // dos filas de texto, línea, subtotal y GST
    h += 13;   // total bar
    h += 6;    // nota
    if (sd.desc) {
      const descLines = doc.splitTextToSize(sd.desc, scenW - 6);
      h += descLines.length * 4 + 4;
    }
    return h;
  });
  const maxColumnHeight = Math.max(...columnHeights) + 4;
  const baseY = y;

  scenDefs.forEach((sd, i) => {
    const sx = M + i*(scenW+4);
    const colH = columnHeights[i];
    fill(sx, y, scenW, 11, sd.hdr);
    sf('bold', 9.5, C.white); text(sd.label, sx+scenW/2, y+7.5, {align:'center'});

    let sy = y + 13;
    fill(sx, sy, scenW, colH - 11, sd.bg);

    // Mostrar solo Subtotal y GST
    sf('normal', 8, C.mid);  text('Subtotal (excl. GST):', sx+3, sy+5);
    sf('normal', 8, C.dark); text('$'+fmtN(sd.s.subtotal), sx+scenW-3, sy+5, {align:'right'}); sy += 7;
    sf('normal', 8, C.mid);  text('GST (15%):', sx+3, sy+5);
    sf('normal', 8, C.dark); text('$'+fmtN(sd.s.gst), sx+scenW-3, sy+5, {align:'right'}); sy += 7;

    // Total bar
    fill(sx, sy+1, scenW, 13, sd.hdr);
    sf('bold', 10, C.white);
    text('TOTAL  $'+fmtN(sd.s.total), sx+scenW/2, sy+9, {align:'center'});
    sy += 14;

    sf('normal', 7, C.mid); text(sd.note, sx+scenW/2, sy+4, {align:'center'});
    sy += 6;

    if (sd.desc) {
      const descLines = doc.splitTextToSize(sd.desc, scenW - 6);
      sf('normal', 7, C.mid);
      descLines.forEach(line => {
        text(line, sx+3, sy+4);
        sy += 4;
      });
    }
  });

  y = baseY + maxColumnHeight + 6;

  // Terms & Conditions (incluye la nota de plantas y andamios)
  if(y>240){ doc.addPage(); y=18; }
  fill(M, y, W-M*2, 7.5, C.lGray); sf('bold',8.5,C.dark); text('TERMS & CONDITIONS', M+4, y+5.5);
  y+=10;
  const terms = [
    '• A 50% deposit is required upon acceptance to confirm the booking and schedule commencement.',
    '• Remaining balance is due upon satisfactory completion of all agreed works.',
    '• This quotation is valid for 30 days from the date above. After this period, prices may be subject to change.',
    '• Any unforeseen structural issues, extensive surface repairs, or additional preparation work will be quoted separately.',
    '• All prices include GST at 15%. ' + (co.gst ? `GST Registration No: ${co.gst}.` : ''),
    '• Paint colours and finishes as agreed with client. Any changes to specification may affect the final price.',
    '• Client to ensure clear and safe access to all areas requiring painting on agreed commencement date.',
    '• When working outdoors near plants and gardens, surrounding vegetation may be affected due to the nature of the work. To minimise potential damage, the use of scaffolding is strongly recommended.',
  ];
  sf('normal',7.5,C.mid);
  terms.forEach(t => {
    const lines = doc.splitTextToSize(t, W - M * 2 - 4);
    lines.forEach(line => {
      if (y > 270) { doc.addPage(); y = 18; }
      text(line, M+2, y);
      y += 5;
    });
    y += 2;
  });

  // Acceptance
  y+=5;
  if(y>270){ doc.addPage(); y=18; }

// Extender DB con métodos de perfiles
Object.assign(DB, {
  getProfiles:       ()  => JSON.parse(localStorage.getItem('ppc_profiles') || '[]'),
  getProfileById:    (id)=> DB.getProfiles().find(p => p.id === id),
  getProfileByName:  (name) => DB.getProfiles().find(p =>
    p.clientName?.toLowerCase().trim() === name?.toLowerCase().trim()
  ),
  saveProfile: (profile) => {
    const all = DB.getProfiles();
    const i   = all.findIndex(p => p.id === profile.id);
    if (i >= 0) all[i] = profile; else all.push(profile);
    localStorage.setItem('ppc_profiles', JSON.stringify(all));
  },
  deleteProfile: (id) => {
    localStorage.setItem('ppc_profiles',
      JSON.stringify(DB.getProfiles().filter(p => p.id !== id)));
  },
});

// Estado del perfil abierto
let currentProfile    = null;
let activeProfileTab  = 'info';

// ---- Helper: obtener todas las cotizaciones de un cliente ----
function getClientQuotes(clientName) {
  const allQuotes = DB.getQuotes();
  return allQuotes.filter(q =>
    (q.client?.name || '').toLowerCase().trim() === (clientName || '').toLowerCase().trim()
  );
}
// ---- Abrir perfil desde una cotización ----
function openClientProfile(quoteId) {
  const quote = DB.getQuoteById(quoteId);
  if (!quote) return;
  const clientName = quote.client?.name || '';

  let profile = DB.getProfileByName(clientName);
  if (!profile) {
    profile = {
      id:               gid(),
      clientName:       clientName,
      clientEmail:      quote.client?.email   || '',
      clientPhone:      quote.client?.phone   || '',
      clientAddress:    quote.client?.address || '',
      firstContactDate: quote.createdAt
        ? new Date(quote.createdAt).toISOString().split('T')[0]
        : new Date().toISOString().split('T')[0],
      photos:        [],
      technicalInfo: { colors:'', paintTypes:'', notes:'' },
      payments:      [],
      notes:         '',
    };
    DB.saveProfile(profile);
  } else {
    // Rellenar campos vacíos con datos de la cotización
    if (!profile.clientEmail   && quote.client?.email)   profile.clientEmail   = quote.client.email;
    if (!profile.clientPhone   && quote.client?.phone)   profile.clientPhone   = quote.client.phone;
    if (!profile.clientAddress && quote.client?.address) profile.clientAddress = quote.client.address;
  }

  currentProfile   = profile;
  activeProfileTab = 'info';

  document.getElementById('profile-overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
  renderProfileView();
}

function uploadProfilePhotos(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const type    = document.getElementById('photo-type')?.value || 'before';
  const caption = document.getElementById('photo-caption')?.value || '';
  const date    = new Date().toLocaleDateString('es-NZ');
  let done = 0;
  const total = files.length;

  const processFile = (file) => {
    const ext = file.name.split('.').pop().toLowerCase();
    const isHEIC = ext === 'heic' || ext === 'heif' || file.type === 'image/heic' || file.type === 'image/heif';

    if (isHEIC) {
      // Convertir HEIC a blob PNG/JPEG con heic2any
      const reader = new FileReader();
      reader.onload = (e) => {
        const buffer = e.target.result;
        heic2any({ blob: new Blob([buffer], { type: file.type }), toType: 'image/jpeg', quality: 0.85 })
          .then((convertedBlob) => {
            // Convertir el blob resultante a Data URL y seguir el proceso normal
            const url = URL.createObjectURL(convertedBlob);
            const img = new Image();
            img.onload = () => {
              compressAndStore(img, file.name);
              URL.revokeObjectURL(url);
            };
            img.onerror = () => {
              notify(`"${file.name}" no se pudo procesar (HEIC)`, 'err');
              done++;
            };
            img.src = url;
          })
          .catch(() => {
            notify(`"${file.name}" error al convertir HEIC`, 'err');
            done++;
          });
      };
      reader.readAsArrayBuffer(file);
      return;
    }

    // Para formatos normales (JPEG, PNG, WebP, etc.)
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        compressAndStore(img, file.name);
      };
      img.onerror = () => {
        notify(`"${file.name}" no pudo procesarse`, 'err');
        done++;
      };
      img.src = e.target.result;
    };
    reader.onerror = () => {
      notify(`"${file.name}" error al leer`, 'err');
      done++;
    };
    reader.readAsDataURL(file);
  };

  // Función común para comprimir y guardar
  const compressAndStore = (img, fileName) => {
    const MAX_W = 1200;
    let w = img.width, h = img.height;
    if (w > MAX_W || h > MAX_W) {
      const ratio = Math.min(MAX_W / w, MAX_W / h);
      w = Math.round(w * ratio);
      h = Math.round(h * ratio);
    }
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    const compressed = canvas.toDataURL('image/jpeg', 0.85);

    if (!currentProfile.photos) currentProfile.photos = [];
    currentProfile.photos.push({
      id: gid(),
      type,
      dataUrl: compressed,
      caption,
      date,
      fileName: fileName
    });
    done++;
    if (done === total) {
      DB.saveProfile(currentProfile);
      renderProfileView();
      notify(`✓ ${total} foto${total > 1 ? 's' : ''} agregada${total > 1 ? 's' : ''}`);
    }
  };

  // Iniciar procesamiento
  files.forEach(file => {
    const validExts = ['jpg', 'jpeg', 'png', 'webp', 'heic', 'heif', 'avif', 'bmp', 'gif'];
    const ext = file.name.split('.').pop().toLowerCase();
    if (!validExts.includes(ext) && !file.type.startsWith('image/')) {
      notify(`"${file.name}" no es un formato de imagen válido`, 'err');
      done++;
      return;
    }
    processFile(file);
  });
}

  if (!confirm('¿Eliminar esta foto?')) return;
  currentProfile.photos = (currentProfile.photos||[]).filter(ph => ph.id !== photoId);
  DB.saveProfile(currentProfile);
  renderProfileView();
  notify('Foto eliminada','err');
}
// ---- Visor de foto ampliada ----
// Visor de fotos con navegación, marca de agua (logo) y pie con título + dirección
function openPhotoViewer(photoId) {
  if (!currentProfile) return;
  const photos = currentProfile.photos || [];
  const index = photos.findIndex(p => p.id === photoId);
  if (index === -1) return;

  const company = DB.getCompany();
  const logoUrl = company.logo; // puede ser null

  // Contenedor principal del visor (fondo oscuro)
  const overlay = document.createElement('div');
  overlay.id = 'photo-viewer-overlay';
  overlay.style.cssText = `
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.92);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    cursor: pointer;
  `;

  // Área de la imagen (con canvas para dibujar marca de agua)
  const imgContainer = document.createElement('div');
  imgContainer.style.cssText = `
    position: relative; max-width: 90vw; max-height: 80vh;
    display: flex; justify-content: center; align-items: center;
    cursor: default;
  `;
  
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'max-width: 100%; max-height: 100%; display: block; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);';
  imgContainer.appendChild(canvas);
  
  // Botón cerrar (✕)
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕';
  closeBtn.style.cssText = `
    position: fixed; top: 20px; right: 20px; width: 44px; height: 44px;
    background: rgba(0,0,0,0.7); color: white; border: 2px solid white;
    border-radius: 50%; font-size: 24px; font-weight: bold;
    cursor: pointer; z-index: 10000; display: flex; align-items: center;
    justify-content: center; transition: 0.2s;
  `;
  closeBtn.onmouseenter = () => closeBtn.style.background = '#D4871B';
  closeBtn.onmouseleave = () => closeBtn.style.background = 'rgba(0,0,0,0.7)';
  
  // Botones de navegación
  const prevBtn = document.createElement('button');
  prevBtn.textContent = '◀';
  prevBtn.style.cssText = `
    position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.6); color: white; border: none;
    width: 50px; height: 50px; border-radius: 50%; font-size: 28px;
    cursor: pointer; z-index: 10000; transition: 0.2s;
  `;
  prevBtn.onmouseenter = () => prevBtn.style.background = '#D4871B';
  prevBtn.onmouseleave = () => prevBtn.style.background = 'rgba(0,0,0,0.6)';
  
  const nextBtn = document.createElement('button');
  nextBtn.textContent = '▶';
  nextBtn.style.cssText = `
    position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.6); color: white; border: none;
    width: 50px; height: 50px; border-radius: 50%; font-size: 28px;
    cursor: pointer; z-index: 10000; transition: 0.2s;
  `;
  nextBtn.onmouseenter = () => nextBtn.style.background = '#D4871B';
  nextBtn.onmouseleave = () => nextBtn.style.background = 'rgba(0,0,0,0.6)';

  // Pie de foto (título + dirección)
  const captionDiv = document.createElement('div');
  captionDiv.style.cssText = `
    position: fixed; bottom: 20px; left: 0; right: 0;
    text-align: center; color: white; background: rgba(0,0,0,0.6);
    padding: 12px 20px; margin: 0 auto; width: fit-content;
    max-width: 90%; border-radius: 40px; backdrop-filter: blur(5px);
    font-family: sans-serif; pointer-events: none;
  `;

  overlay.appendChild(closeBtn);
  overlay.appendChild(prevBtn);
  overlay.appendChild(nextBtn);
  overlay.appendChild(imgContainer);
  overlay.appendChild(captionDiv);
  document.body.appendChild(overlay);

  let currentIndex = index;
  let currentImage = new Image();
  
  // Cargar y dibujar la foto actual con marca de agua
  function loadAndDrawPhoto(idx) {
    const photo = photos[idx];
    if (!photo) return;
    captionDiv.innerHTML = `
      <div style="font-weight: bold; font-size: 16px; margin-bottom: 4px;">${escapeHtml(photo.caption || 'Sin descripción')}</div>
      <div style="font-size: 13px; opacity: 0.8;">📍 ${escapeHtml(currentProfile.clientAddress || 'Dirección no disponible')}</div>
    `;
    
    const img = new Image();
    img.onload = () => {
      currentImage = img;
      // Ajustar tamaño del canvas al de la imagen escalada (pero manteniendo resolución original)
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      
      // Aplicar marca de agua (logo) si existe
      if (logoUrl) {
        const logoImg = new Image();
        logoImg.onload = () => {
          // 1. Logo pequeño en esquina superior derecha
          const smallSize = 60;
          const smallX = canvas.width - smallSize - 15;
          const smallY = 15;
          ctx.drawImage(logoImg, smallX, smallY, smallSize, smallSize);
          
          // 2. Logo grande central con opacidad
          const maxCenterSize = 150;
          let centerW = logoImg.width;
          let centerH = logoImg.height;
          if (centerW > maxCenterSize || centerH > maxCenterSize) {
            const ratio = Math.min(maxCenterSize / centerW, maxCenterSize / centerH);
            centerW *= ratio;
            centerH *= ratio;
          }
          const centerX = (canvas.width - centerW) / 2;
          const centerY = (canvas.height - centerH) / 2;
          ctx.globalAlpha = 0.25;
          ctx.drawImage(logoImg, centerX, centerY, centerW, centerH);
          ctx.globalAlpha = 1.0;
        };
        logoImg.src = logoUrl;
      }
      
      // Ajustar tamaño visual del canvas para que no desborde
      const maxW = window.innerWidth * 0.9;
      const maxH = window.innerHeight * 0.8;
      let displayW = canvas.width, displayH = canvas.height;
      if (displayW > maxW || displayH > maxH) {
        const ratio = Math.min(maxW / displayW, maxH / displayH);
        displayW *= ratio;
        displayH *= ratio;
      }
      canvas.style.width = `${displayW}px`;
      canvas.style.height = `${displayH}px`;
    };
    img.src = photo.dataUrl;
  }
  
  function showPrev() {
    if (photos.length === 0) return;
    currentIndex = (currentIndex - 1 + photos.length) % photos.length;
    loadAndDrawPhoto(currentIndex);
  }
  
  function showNext() {
    if (photos.length === 0) return;
    currentIndex = (currentIndex + 1) % photos.length;
    loadAndDrawPhoto(currentIndex);
  }
  
  // Eventos
  closeBtn.onclick = (e) => { e.stopPropagation(); overlay.remove(); };
  prevBtn.onclick = (e) => { e.stopPropagation(); showPrev(); };
  nextBtn.onclick = (e) => { e.stopPropagation(); showNext(); };
  overlay.onclick = (e) => {
    if (e.target === overlay) overlay.remove();
  };
  
  // Cargar la primera foto
  loadAndDrawPhoto(currentIndex);
}

// Helper para escapar HTML y evitar inyección
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function downloadProfilePhoto(photoId) {
  const photo = (currentProfile.photos||[]).find(p => p.id === photoId);
  if (!photo) return;
  const a = document.createElement('a');
  a.href = photo.dataUrl;
  a.download = photo.fileName || 'foto.jpg';
  a.click();
  notify('✓ Foto descargada');
}

function previewColor(code) {
  const preview = document.getElementById('color-preview');
  if (preview && code) preview.style.background = '#' + code;
}

function addColorEntry() {
  const code = document.getElementById('new-color-code')?.value?.trim() || 'ccc';
  const desc = document.getElementById('new-color-desc')?.value?.trim() || '';
  if (!currentProfile.technicalInfo) currentProfile.technicalInfo = {};
  if (!currentProfile.technicalInfo.colorEntries) currentProfile.technicalInfo.colorEntries = [];
  currentProfile.technicalInfo.colorEntries.push({ id: gid(), code, desc });
  DB.saveProfile(currentProfile);
  renderProfileView();
}

function updateColorDesc(id, value) {
  const entries = currentProfile.technicalInfo?.colorEntries || [];
  const entry = entries.find(e => e.id === id);
  if (entry) { entry.desc = value; }
}

function removeColorEntry(id) {
  if (!confirm('¿Eliminar este color?')) return;
  currentProfile.technicalInfo.colorEntries = (currentProfile.technicalInfo.colorEntries || []).filter(e => e.id !== id);
  DB.saveProfile(currentProfile);
  renderProfileView();
}

function saveProfTechnical() {
  if (!currentProfile.technicalInfo) currentProfile.technicalInfo = {};
  currentProfile.technicalInfo.paintTypes = document.getElementById('tech-types')?.value || '';
  currentProfile.technicalInfo.notes      = document.getElementById('tech-notes')?.value || '';
  // colorEntries ya se guardaron al agregar/editar
  DB.saveProfile(currentProfile);
  notify('✓ Información técnica guardada');
}

  const totalParcial  = pays.filter(x=>x.status==='Parcial').reduce((s,x)=>s+(+x.amount||0),0);

    st==='Pagado' ? 'bdg-green' : st==='Pendiente' ? 'bdg-red' : 'bdg-amber';

      if (!lastInvoice || !lastInvoice.date) return '';

          </div>
          <div class="pbar" style="margin-top:12px;">
            <div class="pfill" style="width:${Math.min(100, Math.max(0, 100 - percentLeft))}%; background:${isOverdue ? '#DC2626' : isWarning ? '#F59E0B' : '#10B981'};"></div>
          </div>
          ${isOverdue && pendingAmount > 0 ? `
          <div style="margin-top:12px;padding:12px;background:#FEE2E2;border-radius:8px;font-size:13px;color:#DC2626;">
            ⚠️ Interés por mora (${interestRate}% mensual): <strong>+${fmt(interestAmount)}</strong><br>
            <strong>Total a cobrar: ${fmt(pendingAmount + interestAmount)}</strong>
          </div>` : ''}
        </div>
      </div>`;
    })()}

    <!-- Formulario nuevo pago -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header">
        <h2 class="ff-display" style="font-size:18px;font-weight:600;color:#1A3C34;">Registrar Pago</h2>
      </div>
      <div class="card-body">
        <div class="g2" style="gap:14px;margin-bottom:16px;">
          <div>
          <div>
            <label class="lbl">Fecha</label>
            <input id="pay-date" class="inp" type="date" value="${new Date().toISOString().split('T')[0]}">
          </div>
          <div>
            <label class="lbl">Tipo de registro</label>
            <select id="pay-type" class="inp" onchange="if(this.value==='factura') document.getElementById('pay-desc').value='Factura emitida'; else document.getElementById('pay-desc').value='';">
              <option value="pago">💳 Pago</option>
              <option value="factura">🧾 Factura emitida</option>
            </select>
          </div>
          <div>
            <label class="lbl">Monto (NZD) *</label>
            <input id="pay-amount" class="inp" type="number" placeholder="0.00" min="0" step="0.01">
          </div>
          <div>
            <label class="lbl">Método de pago</label>
            <select id="pay-method" class="inp">
              <option>EFT / Transferencia bancaria</option>
              <option>Efectivo</option>
              <option>Tarjeta de crédito / débito</option>
              <option>Cheque</option>
              <option>Otro</option>
            </select>
          </div>
          <div>
            <label class="lbl">Estado</label>
            <select id="pay-status" class="inp">
              <option value="Pagado">✅ Pagado</option>
              <option value="Pendiente">⏳ Pendiente</option>
              <option value="Parcial">🔶 Parcial</option>
            </select>
          </div>
          <div style="grid-column:1/-1;">
            <label class="lbl">Descripción (opcional)</label>
            <input id="pay-desc" class="inp" type="text"
              placeholder="Ej: Depósito 50%, Pago final, Cuota 1 de 2...">
          </div>
        </div>
        <button class="btn btn-amber" onclick="addProfilePayment()">+ Agregar pago</button>
      </div>
    </div>

    <!-- Tabla de pagos -->
    ${pays.length===0 ? `
    <div class="card"><div class="card-body" style="text-align:center;padding:36px;">
      <p style="color:#8A8179;">No hay pagos registrados aún.</p>
    </div></div>` : `
    <div class="card">
      <div class="card-header">
        <h2 class="ff-display" style="font-size:18px;font-weight:600;color:#1A3C34;">Registro de Pagos (${pays.length})</h2>
      </div>
      <div style="overflow-x:auto;">
        <table class="tbl">
          <thead><tr>
            <th>Fecha</th><th>Descripción</th><th>Método</th><th>Estado</th><th>Monto</th><th>Acción</th>
          </tr></thead>
          <tbody>
            ${pays.map(pay => `
            <tr>
              <td style="white-space:nowrap;">${pay.date||'—'}</td>
              <td>${pay.description||'—'}</td>
              <td>${pay.method||'—'}</td>
              <td><span class="bdg ${statusStyle(pay.status)}">${statusIcon(pay.status)} ${pay.status}</span></td>
              <td style="font-weight:700;">${fmt(pay.amount)}</td>
              <td><button class="btn btn-danger btn-sm" onclick="deleteProfilePayment('${pay.id}')">✕</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`}
  </div>`;
}

function savePaymentConfig() {
  if (!currentProfile.paymentConfig) currentProfile.paymentConfig = {};
  currentProfile.paymentConfig.dueDays = parseInt(document.getElementById('cfg-due-days')?.value) || 30;
  currentProfile.paymentConfig.interestRate = parseFloat(document.getElementById('cfg-interest')?.value) || 5;
  DB.saveProfile(currentProfile);
  renderProfileView();
  notify('✓ Configuración de cobranza guardada');
}

function addProfilePayment() {
  const amount = parseFloat(document.getElementById('pay-amount')?.value) || 0;
  // Permitir monto cero SOLO para facturas (así registras la fecha sin afectar saldo)
  if (amount < 0) { notify('El monto no puede ser negativo', 'err'); return; }
  const payType = document.getElementById('pay-type')?.value || 'pago';
  if (payType === 'pago' && amount <= 0) { notify('Ingresa un monto válido para el pago', 'err'); return; }

  if (!currentProfile.payments) currentProfile.payments = [];

  // Para facturas, el estado por defecto es 'Pendiente' (no afecta el saldo)
  const defaultStatus = payType === 'factura' ? 'Pendiente' : 'Pagado';
  const status = document.getElementById('pay-status')?.value || defaultStatus;

  currentProfile.payments.push({
    id:          gid(),
    date:        document.getElementById('pay-date')?.value   || '',
    type:        payType,
    amount,
    method:      document.getElementById('pay-method')?.value || '',
    status:      status,
    description: document.getElementById('pay-desc')?.value   || '',
  });
  DB.saveProfile(currentProfile);
  renderProfileView();
  notify('✓ ' + (payType === 'factura' ? 'Factura' : 'Pago') + ' registrado correctamente');
}

function deleteProfilePayment(payId) {
  if (!confirm('¿Eliminar este registro de pago?')) return;
  currentProfile.payments = (currentProfile.payments||[]).filter(p => p.id !== payId);
  DB.saveProfile(currentProfile);
  renderProfileView();
  notify('Pago eliminado','err');
}

// ---- PESTAÑA: NOTAS ----
function renderProfNotes() {
  return `
  <div class="card">
    <div class="card-header">
      <h2 class="ff-display" style="font-size:19px;font-weight:600;color:#1A3C34;">Notas Generales del Cliente</h2>
      <p style="font-size:13px;color:#8A8179;margin-top:3px;">
        Preferencias, observaciones, comunicaciones importantes, recordatorios...
      </p>
    </div>
    <div class="card-body">
      <textarea id="pf-notes" class="inp" rows="18"
        placeholder="Escribe cualquier información relevante sobre el cliente...

Ej: Le gustan tonos neutros, siempre pide Low Sheen interior.
Contactar sólo después de las 9am. Tiene perros – avisar antes de visitar.
Prefiere cotizaciones por email. Pagos siempre por EFT.
..."
      >${currentProfile.notes||''}</textarea>
      <button class="btn btn-primary" style="margin-top:16px;width:100%;" onclick="saveProfNotes()">
        💾 Guardar notas
      </button>
    </div>
  </div>`;
}

function saveProfNotes() {
  currentProfile.notes = document.getElementById('pf-notes')?.value || '';
  DB.saveProfile(currentProfile);
  notify('✓ Notas guardadas');
}

// ---- Guardar datos del tab activo antes de cambiar ----
function saveProfileTabData(tab) {
  if (!currentProfile) return;
  if (tab === 'info') {
    const nameEl = document.getElementById('pf-name');
    if (nameEl) {
      currentProfile.clientName       = nameEl.value;
      currentProfile.clientPhone      = document.getElementById('pf-phone')?.value   || '';
      currentProfile.clientEmail      = document.getElementById('pf-email')?.value   || '';
      currentProfile.clientAddress    = document.getElementById('pf-address')?.value || '';
      currentProfile.firstContactDate = document.getElementById('pf-date')?.value    || '';
    }
  } else if (tab === 'notes') {
    const el = document.getElementById('pf-notes');
    if (el) currentProfile.notes = el.value;
  } else if (tab === 'technical') {
    const el = document.getElementById('tech-colors');
    if (el) {
      currentProfile.technicalInfo = {
        colors:     el.value,
        paintTypes: document.getElementById('tech-types')?.value || '',
        notes:      document.getElementById('tech-notes')?.value || '',
      };
    }
  }
}

// ---- Guardar perfil completo ----
function saveCurrentProfile() {
  if (!currentProfile) return;
  saveProfileTabData(activeProfileTab);
  DB.saveProfile(currentProfile);
  notify('✓ Perfil guardado correctamente');
}
// ---- Abrir perfil desde alerta de cobranza ----
function searchAndOpenProfile(name) {
  const profile = DB.getProfileByName(name.trim());
  if (profile) {
    currentProfile = profile;
    activeProfileTab = 'payments';
    document.getElementById('profile-overlay').style.display = 'block';
    document.body.style.overflow = 'hidden';
    renderProfileView();
  }
}
// ---- Abrir perfil desde el dashboard con input de búsqueda ----
function openClientProfileFromDashboard() {
  const name = prompt('Ingresa el nombre del cliente para buscar su perfil:');
  if (!name || !name.trim()) return;
  const profile = DB.getProfileByName(name.trim());
  if (!profile) {
    notify('No se encontró perfil para ese cliente. Crea una cotización primero.', 'err');
    return;
  }
  currentProfile = profile;
  activeProfileTab = 'info';
  document.getElementById('profile-overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
  renderProfileView();
}

// Cerrar perfil con Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('profile-overlay')?.style.display === 'block') {
    closeProfileView();
  }
});
</script>
</body>
</html>
